<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="waypoint">
  <defs>
    <radialGradient id="bg" cx="72%" cy="-6%" r="90%">
      <stop offset="0%" stop-color="#16313a"/>
      <stop offset="70%" stop-color="#0f1720"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- compass mark -->
  <g transform="translate(150 315)">
    <circle r="96" fill="none" stroke="#2a3a4a" stroke-width="10"/>
    <path d="M0 -86 L32 8 L0 -8 Z" fill="#2dd4bf"/>
    <path d="M0 86 L-32 -8 L0 8 Z" fill="#6b8096"/>
    <circle r="14" fill="#e7eef5"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="320" y="290" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="104" font-weight="700" fill="#e7eef5" letter-spacing="-2">waypoint</text>
  <text x="322" y="352" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="38" font-weight="500" fill="#2dd4bf">Plan timed stops along your route</text>
  <text x="322" y="404" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="30" fill="#93a4b5">Masjid · toilet · restaurant · pharmacy — with weather at each stop</text>
</svg>
